data_root: /data/datasets/brainsets/processed
log_dir: /workspace/logs
train_transforms:
- _target_: torch_brain.transforms.UnitDropout
  max_units: 300
  min_units: 30
  mode_units: 100
  peak: 4
eval_transforms: []
epochs: 2
batch_size: 256
eval_epochs: 1
eval_batch_size: null
seed: 42
sanity_check_validation: false
optim:
  base_lr: 3.125e-05
  weight_decay: 0.0001
  lr_decay_start: 0.5
wandb:
  enable: false
  entity: null
  project: poyo
  run_name: poyo_1
  log_model: false
precision: bf16-mixed
nodes: 1
gpus: 1
num_workers: 8
ckpt_path: null
model:
  _target_: torch_brain.models.POYO
  sequence_length: 1.0
  latent_step: 0.125
  num_latents_per_step: 32
  dim: 128
  dim_head: 64
  depth: 24
  cross_heads: 4
  self_heads: 8
  ffn_dropout: 0.2
  lin_dropout: 0.4
  atn_dropout: 0.2
dataset:
  _target_: poyo_datasets.poyo_1.Poyo1Dataset
